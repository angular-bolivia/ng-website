# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NG_BOLIVIA_WEBSITE }}'
          channelId: live
          projectId: ng-bolivia-website
          # Pinned to avoid the 15.22.3 regression (firebase/firebase-tools#10730)
          # where deploys succeed but exit 1 on "current active version".
          firebaseToolsVersion: 15.22.1
